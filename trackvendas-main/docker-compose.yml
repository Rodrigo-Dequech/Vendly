services:
 db:
 image: postgres:16-alpine
 restart: unless-stopped
 environment:
 POSTGRES_DB: vendly
 POSTGRES_USER: admin
 POSTGRES_PASSWORD: admin
 volumes:
 - db_data:/var/lib/postgresql/data
 - ./db/init:/docker-entrypoint-initdb.d

 backend:
 image: ghcr.io/rodrigo-dequech/vendly-backend:latest
 restart: unless-stopped
 env_file: .env
 depends_on:
 - db
 ports:
 - "127.0.0.1:8400:4000"

 frontend:
 image: ghcr.io/rodrigo-dequech/vendly-frontend:latest
 restart: unless-stopped
 depends_on:
 - backend
 ports:
 - "127.0.0.1:8081:80"

volumes:
 db_data: