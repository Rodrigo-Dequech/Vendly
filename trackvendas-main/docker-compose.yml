version: "3.8"

services:
 db:
 image: postgres:16-alpine
 restart: unless-stopped
 environment:
 POSTGRES_DB: vendly
 POSTGRES_USER: admin
 POSTGRES_PASSWORD: admin
 volumes:
 - db_data:/var/lib/postgresql/data
 - ./db/init:/docker-entrypoint-initdb.d

 backend:
 build:
 context: .
 dockerfile: backend/Dockerfile
 restart: unless-stopped
 env_file: .env
 depends_on:
 - db
 ports:
 - "127.0.0.1:8400:4000"

 frontend:
 build:
 context: .
 dockerfile: frontend/Dockerfile
 args:
 VITE_API_BASE_URL: /api
 restart: unless-stopped
 depends_on:
 - backend
 ports:
 - "127.0.0.1:8081:80"

volumes:
 db_data:
